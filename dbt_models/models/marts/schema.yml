# File: dbt_models/models/marts/schema.yml
#
# Data quality tests that run with `dbt test`.
# These prove your pipeline is reliable — a detail that impresses interviewers.

version: 2

models:
  - name: mart_trade_combined
    description: "Main analysis table: joined value, quantity, country names, commodity names"
    columns:
      - name: trade_year
        description: "Year of the trade record"
        tests:
          - not_null
      - name: trade_flow_code
        description: "E=Export, I=Import, R=Reexport"
        tests:
          - not_null
      - accepted_values:
          arguments:
            values: ['E', 'I', 'R']
      - name: value_usd
        description: "Trade value in full USD"
        tests:
          - not_null
      - name: unit_price_usd_per_tonne
        description: "Derived metric: value divided by quantity. NULL when quantity is zero."

  - name: mart_top_exporters
    description: "Aggregated export statistics by country, commodity, and year"
    columns:
      - name: country_name
        tests:
          - not_null
      - name: total_export_value_usd
        tests:
          - not_null

  - name: mart_price_trends
    description: "Global average price per tonne by commodity and year"
    columns:
      - name: trade_year
        tests:
          - not_null
      - name: commodity_name
        tests:
          - not_null
